spring.application.name=jobtracker

# DATABASE CONNECTION (env vars override local defaults)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/jobtracker}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root123}

# JPA (AUTO TABLE CREATION)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Server port (Render sets PORT env var)
server.port=${PORT:8080}